<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <link rel="stylesheet" href="{{ "/style.css" | relURL }}">
  <meta name="codoc-user-id" content="cFhPkVEVKg">
  <script src="https://codoc.jp/js/cms.js" data-usercode="cFhPkVEVKg" charset="utf-8" defer></script>
</head>
<body>
  <header>
    <h1><a href="{{ "/" | relURL }}" style="color: inherit; text-decoration: none;">{{ .Site.Title }}</a></h1>
    {{ if .IsHome }}<p class="site-description">{{ .Site.Params.description }}</p>{{ end }}
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    <p>&copy; {{ now.Format "2006" }} {{ .Site.Params.authorName }}</p>
    {{ if .Site.Params.githubUser }}<a href="https://github.com/{{ .Site.Params.githubUser }}">GitHub</a>{{ end }}
    {{ if .Site.Params.twitterUser }} | <a href="https://twitter.com/{{ .Site.Params.twitterUser }}">Twitter</a>{{ end }}
  </footer>
</body>
</html>
